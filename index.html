		<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background Image Selector</title>
    <style>
		body {
			background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment: fixed;
        }

        .selector-box {
            background-color: rgba(0, 0, 0, 0.7);
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        label {
            display: block;
            margin-bottom: 12px;
            font-size: 1.2rem;
            font-weight: bold;
        }

        select {
            padding: 10px 15px;
            font-size: 1rem;
            border-radius: 5px;
            border: none;
            outline: none;
            cursor: pointer;
            width: 200px;
        }
    </style>
</head>
<body>

    <div class="selector-box">
        <label for="bg-selector">Backround Select:</label>
        <select id="bg-selector">
            <option value="">-- Select None --</option>
            <option value="Floating On Glass Pumpkins.jpg">Floating On Glass Pumpkins EP</option>
            <option value="Trees.jpg">Trees</option>
            <option value="Happy Days (Spring Days Are Coming).png">Spring Days Are Coming</option>
        </select>
    </div>

    <script>
        // 1. Reference the select dropdown element
        const selector = document.getElementById('bg-selector');

        // 2. Add an event listener that waits for the user to make a choice
        selector.addEventListener('change', function() {
            // Get the value of the selected option
            const selectedImage = this.value;

            if (selectedImage) {
                // 3. Inject the CSS background image using the URL function
                document.body.style.backgroundImage = `url('${selectedImage}')`;
            } else {
                // Remove the image if "-- Select None --" is picked
                document.body.style.backgroundImage = 'none';
            }
        });
	</script>
